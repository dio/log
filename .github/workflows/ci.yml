name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (no Docker needed) ─────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test -race ./...

  # ── E2E tests (otel-front via Docker) ──────────────────────────────────────
  e2e:
    name: E2E (otel-front)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Pull otel-front image
        run: docker pull ghcr.io/mesaglio/otel-front:latest

      - name: E2E
        working-directory: e2e
        run: go test -v -tags e2e -timeout 90s ./...
